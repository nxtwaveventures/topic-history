<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{TITLE}} — Topic History Mindmap</title>
<style>
  html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  #bar {
    position: fixed; top: 0; left: 0; right: 0; height: 44px; z-index: 10;
    display: flex; align-items: center; gap: 12px; padding: 0 16px;
    background: #0f172a; color: #e2e8f0; box-shadow: 0 1px 6px rgba(0,0,0,.25);
  }
  #bar .brand { font-weight: 700; letter-spacing: .2px; }
  #bar .meta { color: #94a3b8; font-size: 13px; }
  .markmap { position: fixed; top: 44px; left: 0; right: 0; bottom: 0; }
  .markmap > svg { width: 100%; height: 100%; }
</style>
</head>
<body>
  <div id="bar">
    <span class="brand">🧭 Topic History</span>
    <span class="meta">{{TITLE}} · generated {{DATE}}</span>
  </div>

  <!-- markmap-autoloader reads the markdown outline below and renders the mindmap.
       The native toolbar (bottom-right) provides fit / zoom / expand controls. -->
  <div class="markmap" data-markmap-options="{&quot;initialExpandLevel&quot;:2}">
    <script type="text/template">
{{MARKDOWN}}
    </script>
  </div>

  <script>
    window.markmap = { autoLoader: { toolbar: true } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-autoloader@0.18"></script>
</body>
</html>
